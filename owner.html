<!DOCTYPE html>
<html>
<head>
  <title>OWNER CONTROL</title>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      max-width: 500px;
      margin: auto;
      border: 1px solid #00ffcc;
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    button {
      margin: 5px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
    }

    .item {
      border-bottom: 1px solid #00ffcc33;
      padding: 8px 0;
    }
  </style>
</head>

<body>

<h1>OWNER CONTROL PANEL</h1>

<div class="box">

  <input id="code" placeholder="Code">
  <input id="name" placeholder="Name">
  <input id="url" placeholder="https://...">
  <input id="desc" placeholder="Description">

  <button onclick="addCode()">ADD</button>

  <hr>

  <div id="list"></div>

</div>

<script>
const defaultRoutes = {
  "2010": { name: "MultiMovies", url: "https://multimovies.fyi", desc: "Movies" },
  "1111": { name: "Hacker AI", url: "https://hackerai.co/", desc: "AI tool" },
  "1212": { name: "NoteGPT", url: "https://notegpt.io", desc: "Notes AI" }
};

let savedRoutes = JSON.parse(localStorage.getItem("routes")) || {};
let routes = { ...defaultRoutes, ...savedRoutes };

function save() {
  localStorage.setItem("routes", JSON.stringify(routes));
}

function render() {
  let html = "";

  for (let code in routes) {
    html += `
      <div class="item">
        <b>${code}</b> → ${routes[code].name}
        <br>
        <button onclick="editCode('${code}')">Edit</button>
        <button onclick="deleteCode('${code}')">Delete</button>
      </div>
    `;
  }

  document.getElementById("list").innerHTML = html;
}

function addCode() {
  const code = document.getElementById("code").value.trim();
  const name = document.getElementById("name").value;
  const url = document.getElementById("url").value.trim();
  const desc = document.getElementById("desc").value;

  if (!code || !url) return alert("Required");

  routes[code] = { name, url, desc };
  save();
  render();
}

function deleteCode(code) {
  delete routes[code];
  save();
  render();
}

function editCode(code) {
  const n = prompt("Name:", routes[code].name);
  const u = prompt("URL:", routes[code].url);
  const d = prompt("Desc:", routes[code].desc);

  routes[code] = { name: n, url: u, desc: d };
  save();
  render();
}

render();
</script>

</body>
</html>
