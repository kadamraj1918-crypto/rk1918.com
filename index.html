<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      background: radial-gradient(circle at center, #020303, #000000);
      color: #00ffcc;
      font-family: "Share Tech Mono", monospace;
      text-align: center;
      margin-top: 15%;
      overflow: hidden;
    }

    h1 {
      font-size: 28px;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #00ffcc, 0 0 30px #00ffcc;
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      font-size: 16px;
      outline: none;
      width: 200px;
      text-align: center;
      box-shadow: 0 0 10px #00ffcc50;
    }

    input::placeholder {
      color: #00ffcc66;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffcc50;
    }

    button:hover {
      background: #00ffcc;
      color: black;
      box-shadow: 0 0 20px #00ffcc;
    }

    .scanline {
      position: fixed;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,204,0.03) 3px
      );
      pointer-events: none;
    }

    .glitch {
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 red; }
      20% { text-shadow: -2px 0 blue; }
      40% { text-shadow: 2px 2px green; }
      60% { text-shadow: -2px -2px cyan; }
      80% { text-shadow: 2px 0 purple; }
      100% { text-shadow: 0 0 10px #00ffcc; }
    }
  </style>
</head>

<body>

<div class="scanline"></div>

<h1 class="glitch">ACCESS TERMINAL</h1>

<input id="code" placeholder="ENTER CODE">
<br>
<button onclick="go()">EXECUTE</button>

<script>
function go() {
  const code = document.getElementById("code").value;
  window.location.href = "/redirect?code=" + code;
}
</script>

</body>
</html>
