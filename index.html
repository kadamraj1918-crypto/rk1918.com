<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: #00ffcc;
      font-family: "Share Tech Mono", monospace;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 15%;
    }

    h1 {
      letter-spacing: 3px;
      text-shadow: 0 0 10px #00ffcc;
    }

    input {
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-align: center;
      outline: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      height: 20px;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(-5px); }
      25% { transform: translateX(5px); }
      50% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>ACCESS TERMINAL</h1>
  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>
  <div id="status"></div>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* MATRIX RAIN */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);

    if (y * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}
setInterval(draw, 50);

/* TERMINAL LOGIC */
function go() {
  const code = document.getElementById("code").value;
  const status = document.getElementById("status");
  const beep = document.getElementById("beep");

  beep.play();

  status.innerText = "ACCESSING...";
  
  setTimeout(() => {
    fetch("/redirect?code=" + code, { method: "HEAD" })
      .then(res => {
        if (res.status === 302) {
          status.innerText = "ACCESS GRANTED";
          setTimeout(() => {
            window.location.href = "/redirect?code=" + code;
          }, 1000);
        } else {
          deny();
        }
      })
      .catch(() => deny());
  }, 1000);
}

function deny() {
  const status = document.getElementById("status");
  const container = document.querySelector(".container");

  status.innerText = "ACCESS DENIED";
  container.classList.add("shake");

  setTimeout(() => {
    container.classList.remove("shake");
    status.innerText = "";
  }, 800);
}
</script>

</body>
</html>
