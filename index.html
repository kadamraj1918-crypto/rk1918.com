<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 15%;
    }

    h1 {
      letter-spacing: 3px;
      text-shadow: 0 0 10px #00ffcc;
    }

    input {
      padding: 10px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      outline: none;
      margin: 5px;
      width: 85%;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      height: 20px;
    }

    #adminPanel, #ownerPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 15px;
      width: 360px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      box-shadow: 0 0 10px #00ffcc;
      max-height: 350px;
      overflow-y: auto;
    }

    .admin-item {
      border-bottom: 1px solid #00ffcc33;
      padding: 8px 0;
    }

    .admin-btn, .owner-btn {
      position: fixed;
      bottom: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

    .admin-btn { right: 10px; }
    .owner-btn { right: 110px; }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>ACCESS TERMINAL</h1>
  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>
  <div id="status"></div>

  <div id="adminPanel"></div>
  <div id="ownerPanel"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">Admin</button>
<button class="owner-btn" onclick="openOwner()">Owner</button>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(draw, 50);

/* LOAD ROUTES */
let routes = JSON.parse(localStorage.getItem("routes")) || {
  "2010": { name: "MultiMovies", url: "https://multimovies.fyi", desc: "Movie streaming" }
};

function saveRoutes() {
  localStorage.setItem("routes", JSON.stringify(routes));
}

/* TERMINAL */
function go() {
  const code = document.getElementById("code").value;
  const status = document.getElementById("status");
  document.getElementById("beep").play();

  status.innerText = "ACCESSING...";

  setTimeout(() => {
    if (routes[code]) {
      status.innerText = "ACCESS GRANTED 🚀";
      setTimeout(() => window.open(routes[code].url, "_blank"), 800);
    } else {
      status.innerText = "ACCESS DENIED";
    }
  }, 600);
}

/* ADMIN VIEW */
function openAdmin() {
  const pass = prompt("ENTER ADMIN PASSWORD");
  if (pass !== "1918") return alert("ACCESS DENIED");

  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";

  let html = "<h3>ADMIN DATABASE</h3>";
  for (let code in routes) {
    html += `
      <div class="admin-item">
        <b>${code}</b> → ${routes[code].name}
        <br><small>${routes[code].desc}</small>
      </div>
    `;
  }
  panel.innerHTML = html;
}

/* OWNER PORTAL */
function openOwner() {
  const pass = prompt("ENTER OWNER PASSWORD");
  if (pass !== "19181918") return alert("ACCESS DENIED");

  const panel = document.getElementById("ownerPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";

  panel.innerHTML = `
    <h3>OWNER CONTROL</h3>

    <input id="oCode" placeholder="Code (e.g. 5555)">
    <input id="oName" placeholder="Website Name">
    <input id="oURL" placeholder="https://example.com">
    <input id="oDesc" placeholder="Description">

    <button onclick="addCode()">ADD CODE</button>
    <hr>
    <div id="ownerList"></div>
  `;

  renderOwnerList();
}

function renderOwnerList() {
  let html = "";
  for (let code in routes) {
    html += `<div class="admin-item"><b>${code}</b> → ${routes[code].name}</div>`;
  }
  document.getElementById("ownerList").innerHTML = html;
}

function addCode() {
  const code = document.getElementById("oCode").value;
  const name = document.getElementById("oName").value;
  const url = document.getElementById("oURL").value;
  const desc = document.getElementById("oDesc").value;

  if (!code || !url) return alert("Code & URL required");

  routes[code] = { name, url, desc };
  saveRoutes();
  renderOwnerList();
}
</script>

</body>
</html>
