<!DOCTYPE html>
<html>
<head>
  <title>Enter Code</title>
</head>
<body style="background:black;color:#00ffff;text-align:center;margin-top:100px;font-family:monospace;">

<h2>Enter Code</h2>
<input id="code" placeholder="Enter code">
<button onclick="go()">Go</button>

<script>
function go() {
  var code = document.getElementById("code").value;
  window.location.href = "/redirect?code=" + code;
}
</script>

</body>
</html>
