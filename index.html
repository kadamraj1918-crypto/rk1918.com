<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: #00ffcc;
      font-family: "Share Tech Mono", monospace;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 15%;
    }

    input {
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-align: center;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 10px;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>ACCESS TERMINAL</h1>

  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>

  <div id="status"></div>
  <div id="adminPanel"></div>
</div>

<button onclick="openAdmin()" style="position:fixed;bottom:10px;right:10px;">Admin</button>

<script>
/* ROUTES (FRONTEND) */
const routes = {
  "2010": { label: "MultiMovies" },
  "1111": { label: "Hacker AI" },
  "1212": { label: "NoteGPT" },
  "1819": { label: "TBCPL" },

  "2222": { label: "WhatsMyName" },
  "4111": { label: "FMHY" },
  "8787": { label: "MoeWalls" },
  "4545": { label: "BugMeNot" },
  "3434": { label: "Instagram" },

  "9999": { label: "My PDF" }
};

function go() {
  const code = document.getElementById("code").value;
  const status = document.getElementById("status");

  status.innerText = "ACCESSING...";

  setTimeout(() => {
    if (routes[code]) {
      status.innerText = "ACCESS GRANTED";

      setTimeout(() => {
        if (code === "9999") {
          window.location.href = "/notes.pdf";
        } else {
          window.location.href = "/redirect?code=" + code;
        }
      }, 800);

    } else {
      status.innerText = "ACCESS DENIED";
    }
  }, 800);
}

/* ADMIN */
let adminVisible = false;

function openAdmin() {
  const pass = prompt("ENTER ADMIN PASSWORD");

  if (pass === "1918") {
    const panel = document.getElementById("adminPanel");

    if (adminVisible) {
      panel.style.display = "none";
      panel.innerHTML = "";
      adminVisible = false;
    } else {
      panel.style.display = "block";

      let html = "<h3>ADMIN PANEL</h3>";
      for (let code in routes) {
        html += "<p>" + code + " → " + routes[code].label + "</p>";
      }

      panel.innerHTML = html;
      adminVisible = true;
    }

  } else {
    alert("ACCESS DENIED");
  }
}
</script>

</body>
</html>
