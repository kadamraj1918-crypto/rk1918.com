<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL v3</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* BOOT */
    #boot {
      position: absolute;
      width: 100%;
      height: 100%;
      padding: 20px;
      white-space: pre-line;
    }

    /* LOGIN */
    #login {
      display: none;
      text-align: center;
      margin-top: 15%;
    }

    input {
      padding: 10px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      margin: 5px;
      text-align: center;
      outline: none;
    }

    button {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
      margin-top: 10px;
    }

    /* LOADING */
    #loading {
      display: none;
      text-align: center;
      margin-top: 20%;
    }

    .bar {
      width: 300px;
      height: 10px;
      border: 1px solid #00ffcc;
      margin: auto;
      margin-top: 20px;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #00ffcc;
    }

    /* TERMINAL */
    #terminal {
      display: none;
      text-align: center;
      margin-top: 10%;
    }

    #status {
      margin-top: 15px;
      height: 20px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 10px;
      width: 320px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- BOOT -->
<div id="boot"></div>

<!-- LOGIN -->
<div id="login">
  <h2>SYSTEM LOGIN</h2>
  <input id="user" placeholder="USERNAME"><br>
  <input id="pass" type="password" placeholder="PASSWORD"><br>
  <button onclick="login()">ENTER</button>
</div>

<!-- LOADING -->
<div id="loading">
  <h3>VERIFYING ACCESS...</h3>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <h1>ACCESS TERMINAL</h1>

  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>

  <div id="status"></div>

  <div id="adminPanel"></div>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y,i)=>{
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,y*fontSize);

    if(y*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(draw,50);

/* BOOT SEQUENCE */
const bootText = [
  "Booting system kernel...",
  "Loading secure modules...",
  "Establishing encrypted layer...",
  "Scanning network nodes...",
  "Firewall: ACTIVE",
  "Access protocols loaded...",
  "System ready."
];

let boot = document.getElementById("boot");
let i = 0;

function runBoot(){
  if(i < bootText.length){
    boot.innerText += bootText[i] + "\n";
    i++;
    setTimeout(runBoot, 650);
  } else {
    setTimeout(()=>{
      boot.style.display = "none";
      document.getElementById("login").style.display = "block";
    }, 700);
  }
}

runBoot();

/* LOGIN */
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "admin" && p === "1918"){
    document.getElementById("login").style.display = "none";
    startLoading();
  } else {
    alert("ACCESS DENIED");
  }
}

/* LOADING */
function startLoading(){
  document.getElementById("loading").style.display = "block";

  let fill = document.getElementById("fill");
  let w = 0;

  let interval = setInterval(()=>{
    w += 2;
    fill.style.width = w + "%";

    if(w >= 100){
      clearInterval(interval);
      document.getElementById("loading").style.display = "none";
      document.getElementById("terminal").style.display = "block";
    }
  },40);
}

/* ROUTES */
const routes = {
  "2010":"https://multimovies.fyi",
  "1111":"https://hackerai.co/",
  "1212":"https://notegpt.io",
  "1819":"https://tbcpl.lol/",
  "2222":"https://whatsmyname.me/",
  "4111":"https://fmhy.net/",
  "8787":"https://moewalls.com/",
  "4545":"https://bugmenot.com/",
  "9999":"https://drive.google.com/file/d/1Dquo4RZdefNapARHtKG7jgteNK9F7aCf/view?usp=drive_link"
};

/* TERMINAL */
function go(){
  const code = document.getElementById("code").value;
  const status = document.getElementById("status");
  const beep = document.getElementById("beep");

  beep.play();
  status.innerText = "ACCESSING...";

  setTimeout(()=>{
    if(routes[code]){
      status.innerText = "ACCESS GRANTED";

      setTimeout(()=>{
        window.open(routes[code], "_blank"); // 🔥 FIXED OPENING METHOD
      },800);

    } else {
      status.innerText = "ACCESS DENIED";
    }
  },700);
}
</script>

</body>
</html>
