<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 15%;
    }

    h1 {
      letter-spacing: 3px;
      text-shadow: 0 0 10px #00ffcc;
    }

    input {
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-align: center;
      outline: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      height: 20px;
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 15px;
      width: 320px;
      max-height: 320px;
      overflow-y: auto;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      box-shadow: 0 0 10px #00ffcc;
    }

    .admin-btn {
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
    }

    .owner-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>ACCESS TERMINAL</h1>
  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>
  <div id="status"></div>

  <div id="adminPanel"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">Admin</button>
<button class="owner-btn" onclick="openOwner()">Owner</button>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(draw, 50);

/* ROUTES MERGE */
const defaultRoutes = {
  "2010": { name: "MultiMovies", url: "https://multimovies.fyi", desc: "Movies" },
  "1111": { name: "Hacker AI", url: "https://hackerai.co/", desc: "AI tool" },
  "1212": { name: "NoteGPT", url: "https://notegpt.io", desc: "Notes AI" }
};

let savedRoutes = JSON.parse(localStorage.getItem("routes")) || {};
let routes = { ...defaultRoutes, ...savedRoutes };

function go() {
  const code = document.getElementById("code").value.trim();
  const status = document.getElementById("status");
  document.getElementById("beep").play();

  status.innerText = "ACCESSING...";

  setTimeout(() => {
    if (routes[code]) {
      status.innerText = "ACCESS GRANTED 🚀";
      setTimeout(() => window.open(routes[code].url, "_blank"), 800);
    } else {
      status.innerText = "ACCESS DENIED";
    }
  }, 600);
}

function openAdmin() {
  if (prompt("PASSWORD") !== "1918") return alert("DENIED");

  routes = { ...defaultRoutes, ...(JSON.parse(localStorage.getItem("routes")) || {}) };

  let html = "<h3>DATABASE</h3>";
  for (let code in routes) {
    html += `<div><b>${code}</b> → ${routes[code].name}</div>`;
  }

  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
  panel.innerHTML = html;
}

function openOwner() {
  const pass = prompt("ENTER OWNER PASSWORD");

  if (pass === "19181918") {
    const tab = window.open("owner.html", "_blank");
    if (!tab || tab.closed) window.location.href = "owner.html";
  } else {
    alert("ACCESS DENIED");
  }
}
</script>

</body>
</html>
