<!DOCTYPE html>
<html>
<head>
  <title>ACCESS TERMINAL</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      margin-top: 15%;
    }

    h1 {
      letter-spacing: 3px;
      text-shadow: 0 0 10px #00ffcc;
    }

    input {
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      text-align: center;
      outline: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      height: 20px;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(-5px); }
      25% { transform: translateX(5px); }
      50% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    #adminPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 15px;
      width: 350px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      box-shadow: 0 0 10px #00ffcc;
      max-height: 300px;
      overflow-y: auto;
    }

    .admin-item {
      border-bottom: 1px solid #00ffcc33;
      padding: 8px 0;
    }

    .admin-code {
      color: #00ffff;
      font-weight: bold;
    }

    .admin-name {
      font-size: 14px;
    }

    .admin-desc {
      font-size: 12px;
      opacity: 0.7;
    }

    .admin-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

    /* OWNER PORTAL STYLE */
    .owner-btn {
      position: fixed;
      bottom: 10px;
      right: 110px;
      font-size: 12px;
      opacity: 0.6;
    }

    #ownerPanel {
      display: none;
      margin-top: 20px;
      border: 1px solid #00ffcc;
      padding: 15px;
      width: 350px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      box-shadow: 0 0 10px #00ffcc;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
  <h1>ACCESS TERMINAL</h1>
  <input id="code" placeholder="ENTER CODE">
  <br>
  <button onclick="go()">EXECUTE</button>
  <div id="status"></div>

  <div id="adminPanel"></div>
  <div id="ownerPanel"></div>
</div>

<button class="admin-btn" onclick="openAdmin()">Admin Portal</button>
<button class="owner-btn" onclick="openOwner()">Owner Portal</button>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
/* MATRIX BACKGROUND */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);

    if (y * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}
setInterval(draw, 50);

/* ROUTES */
const routes = {
  "2010": { name: "MultiMovies", url: "https://multimovies.fyi", desc: "Movie streaming (free HD)" },
  "1111": { name: "Hacker AI", url: "https://hackerai.co/", desc: "AI chatbot tool" },
  "1212": { name: "NoteGPT", url: "https://notegpt.io", desc: "AI notes & summarizer" },
  "1819": { name: "TBCPL", url: "https://tbcpl.lol/", desc: "Digital library" },

  "2222": { name: "WhatsMyName", url: "https://whatsmyname.me/", desc: "Username search tool" },
  "4111": { name: "FMHY", url: "https://fmhy.net/", desc: "Free resources hub" },
  "8787": { name: "Moewalls", url: "https://moewalls.com/", desc: "Live wallpapers" },
  "4545": { name: "BugMeNot", url: "https://bugmenot.com/", desc: "Shared login database" },
  "7777": { name: "ElevenLabs", url: "https://elevenlabs.io/app/speech-to-text", desc: "AI voice tools" },

  "9999": { name: "Drive Vault", url: "https://drive.google.com/file/d/1Dquo4RZdefNapARHtKG7jgteNK9F7aCf/view?usp=drive_link", desc: "Private drive file" }
};

/* TERMINAL */
function go() {
  const code = document.getElementById("code").value;
  const status = document.getElementById("status");
  document.getElementById("beep").play();

  status.innerText = "ACCESSING...";

  setTimeout(() => {
    if (routes[code]) {
      status.innerText = "ACCESS GRANTED 🚀";
      setTimeout(() => window.open(routes[code].url, "_blank"), 900);
    } else {
      deny();
    }
  }, 800);
}

function deny() {
  const status = document.getElementById("status");
  const container = document.querySelector(".container");

  status.innerText = "ACCESS DENIED";
  container.classList.add("shake");

  setTimeout(() => {
    container.classList.remove("shake");
    status.innerText = "";
  }, 800);
}

/* ADMIN PANEL */
let adminVisible = false;

function openAdmin() {
  const pass = prompt("ENTER ADMIN PASSWORD");
  const panel = document.getElementById("adminPanel");

  if (pass === "1918") {

    adminVisible = !adminVisible;
    panel.style.display = adminVisible ? "block" : "none";

    if (adminVisible) {
      let content = "<h3>ADMIN DATABASE</h3>";

      for (let code in routes) {
        content += `
          <div class="admin-item">
            <div class="admin-code">${code}</div>
            <div class="admin-name">${routes[code].name}</div>
            <div class="admin-desc">${routes[code].desc}</div>
          </div>
        `;
      }

      panel.innerHTML = content;
    }

  } else {
    alert("ACCESS DENIED");
  }
}

/* OWNER PORTAL */
function openOwner() {
  const pass = prompt("ENTER OWNER PASSWORD");
  const panel = document.getElementById("ownerPanel");

  if (pass === "19181918") {

    panel.style.display = panel.style.display === "block" ? "none" : "block";

    if (panel.style.display === "block") {
      panel.innerHTML = `
        <h3>OWNER CONTROL</h3>

        <input id="oCode" placeholder="Code">
        <input id="oName" placeholder="Website Name">
        <input id="oURL" placeholder="URL">
        <input id="oDesc" placeholder="Description">

        <button onclick="addCode()">ADD</button>
      `;
    }

  } else {
    alert("ACCESS DENIED");
  }
}

function addCode() {
  const code = document.getElementById("oCode").value;
  const name = document.getElementById("oName").value;
  const url = document.getElementById("oURL").value;
  const desc = document.getElementById("oDesc").value;

  if (!code || !url) {
    alert("Code & URL required");
    return;
  }

  routes[code] = { name, url, desc };

  alert("Code Added ✅");
}
</script>

</body>
</html>
